name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . pytest ruff

      - name: Lint
        run: ruff check src tests scripts

      - name: Tests
        run: PYTHONPATH=src pytest tests/ -q

      - name: Smoke-test pipeline (small, fast)
        run: |
          PYTHONPATH=src python scripts/run_pipeline.py --n 2000 --n-iter 3
          PYTHONPATH=src python scripts/run_eda.py
